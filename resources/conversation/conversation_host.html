<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversation Host</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #ffffff;
      color: #1f2937;
    }

    html,
    body,
    #conversation-root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
    }

    .shell {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 12px;
      gap: 12px;
    }

    .shell__header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 8px;
    }

    .shell__title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
    }

    .shell__meta {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
    }

    .shell__payload {
      flex: 1;
      min-height: 0;
      margin: 0;
      padding: 12px;
      overflow: auto;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="conversation-root"></div>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="cai://app/conversation/conversation_host_app.js"></script>
</body>
</html>
