<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Configuration Host</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f3f5fa;
      color: #111827;
    }

    html,
    body,
    #model-config-root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f3f5fa;
    }

    .shell {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 12px;
    }

    .card {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      gap: 10px;
      padding: 12px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
    }

    .payload {
      flex: 1;
      min-height: 0;
      margin: 0;
      padding: 12px;
      overflow: auto;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="model-config-root"></div>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="cai://app/conversation/model_config_host_app.js"></script>
</body>
</html>
