<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulation Host</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f4f7fb;
      color: #0f172a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body,
    #simulation-root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f4f7fb;
    }

    body {
      font-size: 12px;
    }

    .shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 8px;
      gap: 8px;
      background: #f4f7fb;
    }

    .tab-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 2px;
    }

    .tab-row::-webkit-scrollbar {
      height: 4px;
    }

    .tab-row::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }

    .tab-chip {
      appearance: none;
      border: 1px solid #d8e1ec;
      background: #ffffff;
      color: #475569;
      border-radius: 8px;
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .tab-chip.active {
      border-color: #2563eb;
      color: #1d4ed8;
      background: #eff6ff;
    }

    .surface-frame {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }

    .state-stack {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .state-card,
    .content-card,
    .toolbar,
    .metric-card,
    .info-row,
    .history-item,
    .op-section {
      border: 1px solid #d8e1ec;
      border-radius: 10px;
      background: #ffffff;
    }

    .state-card {
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .state-card--info {
      border-color: #c7d7fe;
      background: #eef4ff;
    }

    .state-card--warning {
      border-color: #f5d28d;
      background: #fff7e6;
    }

    .state-card--error {
      border-color: #f3c1c1;
      background: #fff1f2;
    }

    .state-card--empty {
      border-style: dashed;
    }

    .state-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .toolbar {
      min-height: 32px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .toolbar__meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toolbar__title {
      font-size: 12px;
      font-weight: 700;
      color: #0f172a;
    }

    .toolbar__desc {
      font-size: 11px;
      color: #64748b;
    }

    .toolbar__actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
    }

    .content-card {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
      gap: 8px;
      padding: 10px;
      overflow: hidden;
    }

    .content-card.scrollable {
      overflow: auto;
    }

    .responsive-pane {
      display: grid;
      grid-template-columns: minmax(220px, 0.34fr) minmax(0, 0.66fr);
      gap: 8px;
      min-height: 0;
      flex: 1 1 auto;
    }

    .summary-grid,
    .metrics-grid,
    .info-grid,
    .history-list,
    .op-row-list {
      display: grid;
      gap: 8px;
    }

    .summary-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .metrics-grid,
    .info-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .history-list,
    .op-row-list {
      grid-template-columns: 1fr;
    }

    .metric-card,
    .info-row,
    .history-item,
    .op-section {
      padding: 8px;
    }

    .metric-card__header,
    .history-item,
    .op-section__header,
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .metric-card__title,
    .history-item__title {
      font-size: 12px;
      font-weight: 600;
    }

    .metric-card__value {
      font-size: 13px;
      font-weight: 700;
    }

    .card__label,
    .muted-text,
    .history-item__sub {
      font-size: 11px;
      color: #64748b;
    }

    .card__value,
    .op-row__name,
    .op-row__value {
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }

    .history-item__meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .history-item--button,
    .action-btn {
      appearance: none;
      cursor: pointer;
    }

    .history-item--button {
      width: 100%;
      text-align: left;
    }

    .history-item--active {
      border-color: #bcd2ff;
      background: #eef4ff;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .filter-chip {
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid #d8e1ec;
      border-radius: 999px;
      background: #f8fafc;
      display: inline-flex;
      align-items: center;
      color: #475569;
      font-size: 11px;
    }

    .stage {
      flex: 1 1 auto;
      min-height: 0;
      padding: 10px;
      border: 1px dashed #b9c7db;
      border-radius: 8px;
      background: linear-gradient(180deg, #fbfdff 0%, #f8fafc 100%);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stage--scrollable {
      overflow: auto;
    }

    .op-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(255, 255, 255, 0.72);
    }

    .op-row {
      display: grid;
      grid-template-columns: minmax(0, 0.54fr) minmax(0, 0.46fr);
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      background: #ffffff;
    }

    .op-row__value {
      font-weight: 600;
      color: #0f172a;
    }

    .action-btn {
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #334155;
      border-radius: 8px;
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .action-btn--primary {
      border-color: #bcd2ff;
      background: #eef4ff;
      color: #1d4ed8;
    }

    .action-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    @media (max-width: 960px) {
      .responsive-pane,
      .summary-grid,
      .metrics-grid,
      .info-grid,
      .op-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar__actions {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="simulation-root"></div>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="cai://app/simulation/simulation_host_app.js"></script>
</body>
</html>
