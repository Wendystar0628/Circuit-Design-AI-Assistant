<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace Tabs</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f8fafc;
      font-family: "Segoe UI", "SF Pro Display", Arial, sans-serif;
    }

    #tabs-root {
      display: flex;
      align-items: stretch;
      gap: 4px;
      width: 100%;
      height: 100%;
      padding: 4px 8px 0 8px;
      overflow-x: auto;
      overflow-y: hidden;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      box-sizing: border-box;
    }

    #empty-state {
      display: none;
      align-items: center;
      height: 100%;
      color: #94a3b8;
      font-size: 12px;
      white-space: nowrap;
    }

    .tab-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      max-width: 240px;
      height: 30px;
      padding: 0 10px 0 12px;
      border: 1px solid #e2e8f0;
      border-bottom: none;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
      background: #eef2f7;
      color: #475569;
      cursor: pointer;
      flex: 0 0 auto;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
      -webkit-user-select: none;
      user-select: none;
    }

    .tab-chip:hover {
      background: #e2e8f0;
      color: #0f172a;
    }

    .tab-chip.active {
      background: #ffffff;
      color: #0f172a;
      border-color: #cbd5e1;
    }

    .tab-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      line-height: 1;
    }

    .tab-indicators {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .state-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #94a3b8;
    }

    .state-dot.active {
      background: #2563eb;
    }

    .state-dot.dirty {
      background: #f59e0b;
    }

    .close-btn {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      padding: 0;
      transition: background 0.12s ease, color 0.12s ease;
    }

    .close-btn:hover {
      background: #e2e8f0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div id="tabs-root">
    <div id="empty-state"></div>
  </div>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="./workspace_tabs_app.js"></script>
</body>
</html>
