<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace Tabs</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f8fafc;
      font-family: "Segoe UI", "SF Pro Display", Arial, sans-serif;
    }

    #tabs-shell {
      display: flex;
      align-items: stretch;
      gap: 0;
      width: 100%;
      height: 100%;
      background: #eef2f6;
      border-bottom: 1px solid #d8e0ea;
      box-sizing: border-box;
    }

    #tabs-root {
      display: flex;
      align-items: stretch;
      gap: 0;
      min-width: 0;
      flex: 1 1 auto;
      height: 100%;
      padding: 0 0 3px 0;
      overflow-x: auto;
      overflow-y: hidden;
      box-sizing: border-box;
    }

    #tabs-root::-webkit-scrollbar {
      height: 4px;
    }

    #tabs-root::-webkit-scrollbar-track {
      background: transparent;
    }

    #tabs-root::-webkit-scrollbar-thumb {
      background: #b7c0cb;
      border-radius: 999px;
    }

    #tabs-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex: 0 0 auto;
      padding: 0 8px 0 10px;
      border-left: 1px solid #d8e0ea;
      box-sizing: border-box;
      background: #eef2f6;
    }

    #empty-state {
      display: none;
      align-items: center;
      height: 100%;
      color: #94a3b8;
      font-size: 12px;
      white-space: nowrap;
    }

    .tab-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      max-width: 240px;
      height: 32px;
      padding: 0 10px;
      border: none;
      border-right: 1px solid #d8e0ea;
      background: #eef2f6;
      color: #475569;
      cursor: pointer;
      flex: 0 0 auto;
      box-sizing: border-box;
      transition: background 0.12s ease, color 0.12s ease;
      -webkit-user-select: none;
      user-select: none;
    }

    .tab-chip:first-of-type {
      border-left: 1px solid #d8e0ea;
    }

    .tab-chip:hover {
      background: #e3e9f0;
      color: #0f172a;
    }

    .tab-chip.active {
      background: #ffffff;
      color: #0f172a;
      box-shadow: inset 0 -3px 0 #98a2af;
    }

    .tab-chip.active:hover {
      background: #ffffff;
    }

    .tab-name {
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      line-height: 1;
    }

    .tab-meta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .dirty-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #f59e0b;
    }

    .close-btn {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: none;
      border-radius: 0;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      padding: 0;
      transition: background 0.12s ease, color 0.12s ease;
    }

    .close-btn:hover {
      background: #dfe6ee;
      color: #0f172a;
    }

    .simulation-btn {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: background 0.12s ease, opacity 0.12s ease;
    }

    .simulation-btn:hover:not(:disabled) {
      background: #dfe6ee;
    }

    .simulation-btn:disabled {
      cursor: default;
      opacity: 0.45;
    }

    .simulation-btn img {
      width: 16px;
      height: 16px;
      display: block;
    }
  </style>
</head>
<body>
  <div id="tabs-shell">
    <div id="tabs-root">
      <div id="empty-state"></div>
    </div>
    <div id="tabs-actions"></div>
  </div>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="./workspace_tabs_app.js"></script>
</body>
</html>
